# FOBE Mandatory Counterpart Relationships
# If a fact exists with the trigger concept, its counterpart(s) must also exist.
# Missing counterpart = incomplete tagging (not an error in the source data).

cross_statement_ties:
  - name: pnl_net_profit_to_socie
    trigger: { context: PNL, concept: FS.PNL.NET_PROFIT }
    requires: { context: SOCIE, concept: FS.SOCIE.PROFIT_FOR_PERIOD }
    check: equals
    severity: ERROR
    ambiguities:
      - id: DISCONTINUED_OPS_PRESENTATION
        description: "PNL shows continuing ops profit, SOCIE shows total including discontinued"
        confirm_via: "delta matches FS.PNL.PROFIT_DISCONTINUED"
      - id: RECLASSIFICATION_BETWEEN_PERIODS
        description: "SOCIE restated comparative, PNL did not (or vice versa)"
        confirm_via: "mismatch only in comparative period"

  - name: oci_total_to_socie
    trigger: { context: OCI, concept: FS.OCI.TOTAL_OCI }
    requires: { context: SOCIE, concept: FS.SOCIE.OCI_FOR_PERIOD }
    check: equals
    severity: ERROR

  - name: socie_closing_to_sfp_equity
    trigger: { context: SOCIE, concept: FS.SOCIE.TOTAL_EQUITY }
    requires: { context: SFP, concept: FS.SFP.TOTAL_EQUITY }
    check: equals
    severity: ERROR
    ambiguities:
      - id: DIVIDEND_TIMING
        description: "SFP after dividend declaration, SOCIE before (or vice versa)"
        confirm_via: "delta matches dividend amount in SOCIE.DIVIDENDS"

  - name: cfs_closing_cash_to_sfp
    trigger: { context: CFS, concept: FS.CFS.CASH_CLOSING }
    requires: { context: SFP, concept: FS.SFP.CASH }
    check: equals
    severity: ERROR
    ambiguities:
      - id: RESTRICTED_CASH
        description: "SFP includes restricted cash, CFS excludes it (IAS 7.6)"
        confirm_via: "delta matches restricted cash disclosure"
      - id: BANK_OVERDRAFT
        description: "CFS nets bank overdrafts into cash, SFP shows them as borrowings"
        confirm_via: "delta matches bank overdraft liability"

  - name: sfp_balance_equation
    trigger: { context: SFP, concept: FS.SFP.TOTAL_ASSETS }
    requires: { context: SFP, concept: FS.SFP.TOTAL_EQUITY_AND_LIABILITIES }
    check: "trigger.amount + requires.amount = 0"
    severity: ERROR

disaggregation_ties:
  - name: revenue_by_segment
    face: { context: PNL, concept: FS.PNL.REVENUE }
    detail: { context: DISC.SEGMENTS, concept: DISC.SEGMENTS.EXTERNAL_REVENUE, axis: AXIS.SEGMENT_DOC }
    check: "face.amount = SUM(detail.amount by axis) + residual"
    severity: WARNING
    residual_confirm: { concept: DISC.SEGMENTS.INTERSEGMENT_REVENUE, context: DISC.SEGMENTS }
    ambiguities:
      - id: IC_NOT_ELIMINATED
        description: "Intercompany revenue not fully eliminated at group level"
        confirm_via: "residual matches tagged DISC.SEGMENTS.INTERSEGMENT_REVENUE"
        severity: WARNING
      - id: COMPARATIVE_RESTATEMENT
        description: "Prior-year figures restated in current report (IFRS 8.29)"
        confirm_via: "residual only in comparative period, not current"
        severity: INFO
      - id: SEGMENT_RECLASSIFICATION
        description: "Segment boundaries changed between periods (IFRS 8.34)"
        confirm_via: "segment structure differs between current and comparative columns"
        severity: INFO
      - id: ROUNDING_DIFFERENCE
        description: "Independent rounding of face and segment figures"
        confirm_via: "residual < 0.01% of face amount"
        severity: IGNORE

  - name: revenue_by_timing
    face: { context: PNL, concept: FS.PNL.REVENUE }
    detail: { context: DISC.REVENUE }
    concepts: [DISC.REVENUE.GOODS_TRANSFERRED_POINT, DISC.REVENUE.GOODS_TRANSFERRED_OVERTIME]
    check: "face.amount = SUM(detail concepts)"
    severity: WARNING
    ambiguities:
      - id: PARTIAL_DISAGGREGATION
        description: "Timing split does not cover all revenue streams"
        confirm_via: "detail sum < face amount AND other revenue categories exist"
        severity: INFO

  - name: ppe_face_to_note
    face: { context: SFP, concept: FS.SFP.PPE_NET }
    detail: { context: DISC.PPE, concept: DISC.PPE.CARRYING_AMOUNT, axis: AXIS.PPE_CLASS_DOC }
    check: "face.amount = SUM(detail.amount by axis)"
    severity: WARNING
    ambiguities:
      - id: GROSS_VS_NET
        description: "Note shows gross cost, face shows net carrying amount"
        confirm_via: "detail sum > face amount"
        severity: INFO
      - id: CLASS_MISMATCH
        description: "Note PPE classes don't map 1:1 to face line items"
        confirm_via: "detail includes ROU assets or investment property mixed with PPE"
        severity: INFO

  - name: segment_assets_to_total
    face: { context: SFP, concept: FS.SFP.TOTAL_ASSETS }
    detail: { context: DISC.SEGMENTS, concept: DISC.SEGMENTS.TOTAL_ASSETS, axis: AXIS.SEGMENT_DOC }
    check: "face.amount = SUM(detail.amount by axis) + unallocated"
    severity: WARNING
    ambiguities:
      - id: UNALLOCATED_ITEMS
        description: "Corporate/HQ assets not allocated to operating segments"
        confirm_via: "reconciliation table shows unallocated line"
        severity: INFO

  - name: provisions_face_to_note
    face: { context: SFP, concept: FS.SFP.PROVISIONS }
    detail: { context: DISC.PROVISIONS, concept: DISC.PROVISIONS.CLOSING, axis: AXIS.PROVISION_TYPE_DOC }
    check: "face.amount = SUM(detail.amount by axis)"
    severity: WARNING
    ambiguities:
      - id: CURRENT_VS_NONCURRENT_SPLIT
        description: "Face shows current + non-current combined, note splits them"
        confirm_via: "detail sum ≈ face.current_provisions + face.noncurrent_provisions"
        severity: INFO

ic_decomposition:
  - name: revenue_ic
    face_concept: FS.PNL.REVENUE
    external_concept: DISC.SEGMENTS.EXTERNAL_REVENUE
    ic_concept: DISC.SEGMENTS.INTERSEGMENT_REVENUE
    check: "face = SUM(external) + SUM(ic_post_elimination)"
    ambiguities:
      - id: IC_NOT_ELIMINATED
        description: "Intercompany revenue not fully eliminated at group level"
        confirm_via: "residual matches tagged DISC.SEGMENTS.INTERSEGMENT_REVENUE"
        severity: WARNING
      - id: COMPARATIVE_RESTATEMENT
        description: "Prior-year segment figures restated, face not (or vice versa)"
        confirm_via: "residual only in comparative period; current period ties"
        severity: INFO
      - id: SEGMENT_RECLASSIFICATION
        description: "Segment boundaries changed — external/IC split differs"
        confirm_via: "segment structure differs between current and comparative"
        severity: INFO
      - id: ROUNDING
        description: "Independent rounding of face and segment totals"
        confirm_via: "residual < 0.01% of face"
        severity: IGNORE

  - name: trade_receivables_ic
    face_concept: FS.SFP.TRADE_RECEIVABLES
    ic_concept: FS.SFP.RELATED_PARTY_RECEIVABLES
    check: "if ic exists, face should be decomposable into external + ic"
    ambiguities:
      - id: RELATED_PARTY_SCOPE
        description: "Related party receivables may include non-IC items (e.g., key management)"
        confirm_via: "related party note breaks down by counterparty type"
        severity: INFO

  - name: trade_payables_ic
    face_concept: FS.SFP.TRADE_PAYABLES
    ic_concept: FS.SFP.RELATED_PARTY_PAYABLES
    check: "if ic exists, face should be decomposable into external + ic"
    ambiguities:
      - id: RELATED_PARTY_SCOPE
        description: "Related party payables may include non-IC items"
        confirm_via: "related party note breaks down by counterparty type"
        severity: INFO

summation_trees:
  - parent: FS.SFP.TOTAL_ASSETS
    children: [FS.SFP.NON_CURRENT_ASSETS, FS.SFP.CURRENT_ASSETS]
    partial: true

  - parent: FS.SFP.TOTAL_EQUITY_AND_LIABILITIES
    children: [FS.SFP.TOTAL_EQUITY, FS.SFP.NON_CURRENT_LIABILITIES, FS.SFP.CURRENT_LIABILITIES]
    partial: true

  - parent: FS.PNL.GROSS_PROFIT
    children: [FS.PNL.REVENUE, FS.PNL.COST_OF_SALES]

  - parent: FS.PNL.NET_PROFIT
    children: [FS.PNL.PROFIT_BEFORE_TAX, FS.PNL.INCOME_TAX_EXPENSE]

  - parent: FS.OCI.TOTAL_COMPREHENSIVE_INCOME
    children: [FS.PNL.NET_PROFIT, FS.OCI.TOTAL_OCI]

  - parent: FS.CFS.NET_CHANGE_CASH
    children: [FS.CFS.NET_CASH_OPERATING, FS.CFS.NET_CASH_INVESTING, FS.CFS.NET_CASH_FINANCING]
    partial: true

  - parent: FS.CFS.CASH_CLOSING
    children: [FS.CFS.CASH_OPENING, FS.CFS.NET_CHANGE_CASH, FS.CFS.FX_EFFECT_ON_CASH]
    partial: true
