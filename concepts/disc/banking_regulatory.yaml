  - { id: DISC.BANK_REG.NPL_RATIO, label: "Non-performing loan ratio (%)", period_type: instant }
  - { id: DISC.BANK_REG.NPL_COVERAGE_RATIO, label: "NPL coverage ratio (%)", period_type: instant }
