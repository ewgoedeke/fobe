# ── Key UGB vs IFRS structural differences ───────────────────
notes:
  - "UGB mandates Gesamtkostenverfahren (nature-of-expense) per § 231"
  - "UGB P&L extends through appropriation items (Z22-Z26) to Bilanzgewinn — IFRS stops at net profit"
  - "UGB prescribes 4 provision categories (severance, pension, tax, other) — IFRS has one line"
  - "UGB requires legal/statutory/free reserve split — IFRS uses single retained earnings"
  - "IC 'davon' items required on many financial result lines (Z10-Z15)"
  - "Verbindlichkeitenspiegel (§ 225 Abs 6) requires maturity bands: <1yr, 1-5yr, >5yr"
