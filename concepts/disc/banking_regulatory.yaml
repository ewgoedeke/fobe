  - { id: DISC.BANK_REG.DEPOSITS_CORPORATE, label: "Deposits — corporate customers", period_type: instant }
  - { id: DISC.BANK_REG.DEBT_SECURITIES_COVERED_BONDS, label: "Covered bonds issued", period_type: instant }
  - { id: DISC.BANK_REG.DEBT_SECURITIES_SENIOR_PREFERRED, label: "Senior preferred notes", period_type: instant }
  - { id: DISC.BANK_REG.DEBT_SECURITIES_SENIOR_NONPREF, label: "Senior non-preferred notes (MREL-eligible)", period_type: instant }
