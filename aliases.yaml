# FOBE Label Aliases — Common variant phrasings for concept labels
# Used by the consistency engine label index builder.
# Each alias maps to a canonical concept ID.
#
# The canonical label comes from concepts/*.yaml. These aliases cover
# common alternative phrasings found in real financial documents.

aliases:

