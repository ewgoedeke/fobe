    mappable: true
    is_monetary: true
    is_total: false

  - id: FS.SFP.OTHER_LIABILITIES
    label: Other liabilities
    balance_type: credit
    period_type: instant
    source_type: pack
    mappable: true
    is_monetary: true
    is_total: false

  - id: FS.SFP.SUPPLIER_FINANCING_LIABILITIES
