# FS.PNL.* — Profit and Loss / Income Statement
# All amounts in Dr+/Cr- natural sign: expenses positive (debit), income negative (credit)

concepts:

  # ── Revenue ────────────────────────────────────────────────
  - id: FS.PNL.REVENUE
    label: Revenue
    balance_type: credit
    period_type: duration
    source_type: pack
    mappable: true
    is_monetary: false
    is_total: false
    valid_contexts: [PNL, CFS, OCI]
    unit_type: monetary
    has_ic_variant: true
    disaggregation_targets:
      - { context: DISC.SEGMENTS, concept: DISC.SEGMENTS.EXTERNAL_REVENUE, axis: AXIS.SEGMENT_DOC }
      - { context: DISC.REVENUE, concepts: [DISC.REVENUE.GOODS_TRANSFERRED_POINT, DISC.REVENUE.GOODS_TRANSFERRED_OVERTIME] }

  - id: FS.PNL.REVENUE_RECOGNIZED
