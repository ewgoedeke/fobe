  - id: FS.SFP.LIABILITIES_HELD_FOR_SALE
    label: Liabilities associated with assets held for sale (IFRS 5)
    balance_type: credit
    period_type: instant
    source_type: pack
    mappable: true
    is_monetary: false
    is_total: false

  - id: FS.SFP.CURRENT_LIABILITIES
    label: Total current liabilities
    balance_type: credit
    period_type: instant
    source_type: pack
    mappable: false
    is_monetary: false
    is_total: true

  - id: FS.SFP.TOTAL_LIABILITIES
    label: Total liabilities
    balance_type: credit
    period_type: instant
    source_type: pack
    mappable: false
    is_monetary: false
    is_total: true

  - id: FS.SFP.TOTAL_EQUITY_AND_LIABILITIES
    label: Total equity and liabilities
    balance_type: credit
    period_type: instant
    source_type: pack
    mappable: false
    is_monetary: false
    is_total: true
